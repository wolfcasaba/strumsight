name: music_theory
description: "StrumSight — offline, on-device guitar chord & strum-direction detection"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

# StrumSight is a fully OFFLINE, on-device app: no backend, no network at
# runtime. The inherited recipewiser-mobile plugin set has been PRUNED down to
# only what v1 (Live mirror + Tuner + Settings) needs. Detection runs behind an
# engine interface (mock now, C++ FFI later) — see lib/features/live/engine/.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  audio_streamer: ^4.3.0        # mic → PCM stream (real engine — RAG chunk 001)
  cupertino_icons: ^1.0.8
  fftea: ^1.5.0                 # pure-Dart FFT/STFT (DSP core — see docs/rag)
  flutter_riverpod: ^3.3.2      # state (hand-written providers, no codegen)
  permission_handler: ^12.0.0   # RECORD_AUDIO runtime permission
  go_router: ^17.3.0            # navigation shell
  flutter_animate: ^4.5.2       # glanceable micro-animations
  wakelock_plus: ^1.6.1         # keep the screen awake during a Live session
  audioplayers: ^6.8.0          # tuner reference tone / metronome click
  shared_preferences: ^2.3.2    # persist settings (theme, language, threshold)
  package_info_plus: ^10.1.0    # app version on the Settings screen

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  # Generate localizations (AppLocalizations) from lib/l10n/*.arb (see l10n.yaml).
  generate: true
  uses-material-design: true

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat.ttf

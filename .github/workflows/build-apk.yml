name: Build Android APK
on:
  push:
    branches: [master, main]
  workflow_dispatch:
jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true
      - run: flutter pub get
      # HARD gates since round 76 — the suite is mature (350+ tests); a red
      # analyze/test must never produce a green APK. (They were soft in the
      # early rounds to keep APK delivery unblocked.)
      - run: flutter analyze lib/ test/
      - run: flutter test
      # Randomized property gate (anti-reward-hacking, HORIZON pattern):
      # a fresh seed every run so code can't be tuned to fixed fixtures.
      # Hard gate — no continue-on-error.
      - name: Property gate (randomized seed)
        run: flutter test test/property
        env:
          PROPERTY_SEED: ${{ github.run_id }}
      # StrumSight is fully offline — no --dart-define needed. Release signs
      # with the debug keystore (android/app/build.gradle.kts) so the APK is
      # sideloadable without a keystore secret.
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: strumsight-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

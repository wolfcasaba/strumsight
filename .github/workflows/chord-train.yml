name: Chord model train (x86 CI)

# ML CHORD track, phase 1 — trains the v0 frame-wise majmin chord model on the
# real Klangio solo-guitar recordings on a fast x86 runner (the ARM dev box is
# slow + unreliable for TF/GRU). Fetches Klangio at the SHA pinned in klangio.py,
# builds CQT features + per-frame chord labels, trains, uploads eval + weights.
# Triggers: manual (workflow_dispatch) OR a push that touches the chord ML code
# (path-filtered so it runs only for deliberate ML changes, not every commit) —
# the latter lets the autonomous loop kick a training run with an ordinary push
# when a token can't dispatch. See docs/plans/ml-chord-track.md.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'ml/chords/**'
      - '.github/workflows/chord-train.yml'
jobs:
  chord-train:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          # scipy: eval_guitarset resamples GuitarSet's 44.1 kHz mic audio to the
          # model's 22.05 kHz with resample_poly (proper anti-aliasing); without
          # it the eval falls back to linear decimation and under-reports.
          pip install "numpy>=1.26" "tensorflow>=2.16" scipy pytest
      - name: Fetch Klangio dataset at the pinned SHA
        run: |
          set -euo pipefail
          SHA=$(python -c "import sys; sys.path.insert(0,'ml'); import klangio; print(klangio.DATASET_SHA)")
          REPO=$(python -c "import sys; sys.path.insert(0,'ml'); import klangio; print(klangio.DATASET_REPO)")
          SUBPATH=$(python -c "import sys; sys.path.insert(0,'ml'); import klangio; print(klangio.DATASET_PATH)")
          git clone --quiet "https://github.com/${REPO}.git" klangio-src
          git -C klangio-src checkout --quiet "$SHA"
          mkdir -p ml/data/klangio
          cp klangio-src/${SUBPATH}/recording_*.strums ml/data/klangio/
          cp klangio-src/${SUBPATH}/recording_*_phone.wav ml/data/klangio/
          echo "recordings: $(ls ml/data/klangio/recording_*_phone.wav | wc -l)"
      - name: Chord module unit tests (TDD gate)
        working-directory: ml
        run: python -m pytest chords/test_labels.py chords/test_frames.py chords/test_cqt.py chords/test_synth_songs.py chords/test_dataset_synth.py chords/test_augment.py chords/test_guitarset.py chords/test_dataset_guitarset.py -q

      # --- GuitarSet: REAL guitar audio with TRUE chord labels ----------------
      # Fetched BEFORE training since r203: GuitarSet is now a TRAINING pool (all
      # guitarists except the held-out one) as well as the honest benchmark, and
      # the LOGO hold-out eval at the end of training reads it too.
      # Still BEST-EFFORT — Zenodo being slow/down must never fail a training
      # run: the download is continue-on-error, and train_chord.py skips the
      # real-audio pool + the LOGO score gracefully when the dataset is absent
      # (the run then trains on Klangio+synth exactly as it did pre-r203).
      - name: GuitarSet cache key
        id: gskey
        # Derived from the Zenodo record + the exact file names guitarset.py
        # fetches, so bumping either constant invalidates the cache by itself.
        run: |
          set -euo pipefail
          KEY=$(python -c "import sys; sys.path.insert(0,'ml'); from chords import guitarset as g; print('guitarset-%d-%s' % (g.ZENODO_RECORD, '-'.join(z.replace('.zip','') for z in g.REQUIRED_ZIPS)))")
          echo "key=$KEY" >> "$GITHUB_OUTPUT"
          echo "cache key: $KEY"
      - name: Cache GuitarSet (~1.5 GB extracted — avoids a 700 MB Zenodo fetch)
        uses: actions/cache@v4
        with:
          path: ml/data/guitarset
          key: ${{ steps.gskey.outputs.key }}
      - name: Download GuitarSet (annotation + mono-mic audio)
        continue-on-error: true
        timeout-minutes: 30
        # Idempotent: a cache hit means the extract dirs exist and this no-ops.
        run: python -c "import sys; sys.path.insert(0,'ml'); from chords import guitarset; guitarset.download()"

      - name: Train v0 chord model
        env:
          TF_CPP_MIN_LOG_LEVEL: "3"
        run: python ml/chords/train_chord.py
      - name: Show eval
        run: cat ml/chords/out/chord_eval.txt || true
      - name: Export Dart weights + inference-parity fixture
        # Ship-path step 2 (r195): serialize the trained model to the compact
        # Dart-loadable CCRN blob + a golden forward-pass fixture. TF-only (the
        # ARM dev box lacks TF) so it runs here, after training. Writes
        # chord_crnn.bin + chord_infer_fixture.json into ml/chords/out/.
        env:
          TF_CPP_MIN_LOG_LEVEL: "3"
        run: python ml/chords/export_chord_dart.py

      # --- GuitarSet full benchmark (r202) ------------------------------------
      # The whole-corpus breakdown (per guitarist / mode / style + degeneracy
      # tripwires). NOTE since r203 most of these guitarists are IN the train
      # pool, so their scores are fit, not generalisation — the honest
      # new-player number is `guitarset_logo_comp_wcsr` in chord_eval.txt, and
      # the `guitarist_05` line here is its per-track cross-check.
      - name: Eval on GuitarSet (real audio, true labels)
        continue-on-error: true
        env:
          TF_CPP_MIN_LOG_LEVEL: "3"
        run: python ml/chords/eval_guitarset.py
      - name: Show GuitarSet eval
        if: always()
        run: cat ml/chords/out/guitarset_eval.txt || echo "(no GuitarSet eval produced)"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chord-model-v0
          if-no-files-found: warn
          path: |
            ml/chords/out/chord_eval.txt
            ml/chords/out/guitarset_eval.txt
            ml/chords/out/chord_weights.npz
            ml/chords/out/chord_crnn.bin
            ml/chords/out/chord_infer_fixture.json
